<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Formas</title>
    <link href="newcss.css" rel="stylesheet" type="text/css">
</head>
<body>
    <h1>Formas un ievadlauku piemērs</h1>

<form>
    <p>Šodienas datums <input name="datums"></p>
    <p>Ja gribi uzzināt šodienas datumu, spied pogu DATUMS 
        <input onclick="datums.value=new Date();" name="poga" value="DATUMS" type="button">
    </p>
    <p>Ja gribi izdzēst datuma lodziņa saturu, spied pogu RESET
        <input value="RESET" type="reset">
    </p>
</form>

<form name="mathForm">
    <div>1. skaitlis <input type="text" name="sk1"> </div>
    <div>2. skaitlis <input type="text" name="sk2"> </div>
    <hr>
    <div>
        <input value="X" name="reiz" onclick="mathForm.rez.value=sk1.value*sk2.value" type="button">
        <input value="+" name="plus" onclick="mathForm.rez.value=Number(sk1.value)+Number(sk2.value)" type="button">
        <input value="-" name="minus" onclick="mathForm.rez.value=Number(sk1.value)-Number(sk2.value)" type="button">
        <input value="/" name="dal" onclick="mathForm.rez.value=Number(sk1.value)/Number(sk2.value)" type="button">
        <input value="RESET" type="reset">
    </div>
    <div>Rezultāts <input name="rez"> </div>
</form>
</body>
</html>
